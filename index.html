    <style>
      /* Fix #30: CSS fallback for :focus-visible — catches any element where
         the JS-based boxShadow handler fails to fire. Defense-in-depth only;
         the JS handlers remain the primary indicator. */
      *:focus-visible { outline: 2px solid #B8336A !important; outline-offset: 2px; }
      /* Attribution link: underline for distinguishability (WCAG link-in-text-block) */
      .maplibregl-ctrl-attrib a { text-decoration: underline; font-weight: 600; }
    </style>
